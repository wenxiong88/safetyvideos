<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafetyFeed</title>
<link rel="stylesheet" href="styles.css">
<script>if(localStorage.getItem('safetyReminder_theme')!=='light')document.documentElement.classList.add('dark-theme');</script>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-title">
    <svg class="logo-icon" viewBox="0 0 28 28" fill="none"><defs><linearGradient id="logoGr" x1="4" y1="2" x2="24" y2="27"><stop stop-color="#A99BFF"/><stop offset="1" stop-color="#4FD1FF"/></linearGradient></defs><path d="M14 2L4 6.5V13C4 19.35 8.28 25.22 14 27C19.72 25.22 24 19.35 24 13V6.5L14 2Z" fill="rgba(169,155,255,0.15)" stroke="url(#logoGr)" stroke-width="1.5" stroke-linejoin="round"/><polyline points="8,15 11,15 12.5,10.5 14,19.5 15.5,12.5 17,15 20,15" fill="none" stroke="url(#logoGr)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>SafetyFeed</span>
  </div>
  <div class="search-bar">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Search safety videos..." id="searchInput">
  </div>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<!-- Side Navigation (desktop) -->
<nav class="side-nav">
  <a href="#" class="active" data-nav="home">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </a>
  <a href="#" data-nav="discover">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
    Discover
  </a>
  <a href="#" data-nav="learn">
    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Learn
  </a>
</nav>

<!-- Bottom Navigation (mobile/tablet) -->
<nav class="bottom-nav">
  <a href="#" class="active" data-nav="home">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </a>
  <a href="#" data-nav="discover">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
    Discover
  </a>
  <a href="#" data-nav="learn">
    <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Learn
  </a>
</nav>

<!-- Home Page (default) -->
<main class="main page-section page-home" id="page-home">

  <!-- HUD corner ticks -->
  <div class="h-hud h-hud-tl"></div>
  <div class="h-hud h-hud-tr"></div>
  <div class="h-hud h-hud-bl"></div>
  <div class="h-hud h-hud-br"></div>

  <!-- Background layers -->
  <div class="h-bg">
    <div class="h-mesh"></div>
    <div class="h-grid"></div>
    <div class="h-orb h-orb1"></div>
    <div class="h-orb h-orb2"></div>
    <div class="h-orb h-orb3"></div>

    <!-- Orbiting dot rings -->
    <div class="h-orbit h-orbit1">
      <span class="h-dot"></span><span class="h-dot"></span><span class="h-dot"></span>
      <span class="h-dot"></span><span class="h-dot"></span><span class="h-dot"></span>
      <span class="h-dot"></span><span class="h-dot"></span>
    </div>
    <div class="h-orbit h-orbit2">
      <span class="h-dot"></span><span class="h-dot"></span><span class="h-dot"></span>
      <span class="h-dot"></span><span class="h-dot"></span><span class="h-dot"></span>
    </div>
    <div class="h-orbit h-orbit3">
      <span class="h-dot"></span><span class="h-dot"></span><span class="h-dot"></span>
      <span class="h-dot"></span><span class="h-dot"></span><span class="h-dot"></span>
      <span class="h-dot"></span><span class="h-dot"></span><span class="h-dot"></span>
      <span class="h-dot"></span>
    </div>

    <!-- Floating particles -->
    <div class="h-pt" style="width:5px;height:5px;left:12%;top:25%"></div>
    <div class="h-pt h-pt-alt" style="width:4px;height:4px;left:78%;top:18%;animation-delay:2s"></div>
    <div class="h-pt" style="width:4px;height:4px;left:55%;top:70%;animation-delay:4s"></div>
    <div class="h-pt h-pt-alt" style="width:5px;height:5px;left:25%;top:65%;animation-delay:1s"></div>
    <div class="h-pt" style="width:4px;height:4px;left:85%;top:55%;animation-delay:3s"></div>
    <div class="h-pt h-pt-alt" style="width:3px;height:3px;left:40%;top:15%;animation-delay:5s"></div>
    <div class="h-pt" style="width:5px;height:5px;left:65%;top:80%;animation-delay:2.5s"></div>
    <div class="h-pt h-pt-alt" style="width:4px;height:4px;left:8%;top:50%;animation-delay:6s"></div>
  </div>

  <!-- Brand block -->
  <div class="h-center">
    <div class="h-logo-wrap">
      <div class="h-ring h-ring1"></div>
      <div class="h-ring h-ring2"><span class="h-ring-node"></span></div>
      <div class="h-ring h-ring3"></div>
      <svg class="h-shield" viewBox="0 0 24 24" fill="none">
        <path d="M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5l-8-3Z" stroke="url(#hShGr)" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M6.5 12h2.2l1.4-3 2 5 1.5-3 1.1 1h2.8" stroke="url(#hShGr)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="hShGr" x1="4" y1="2" x2="20" y2="22"><stop stop-color="#A99BFF"/><stop offset="1" stop-color="#4FD1FF"/></linearGradient></defs>
      </svg>
    </div>
    <h1 class="h-title">Safety<span>Feed</span></h1>
    <div class="h-tagline">
      <span>Watch</span>
      <span class="h-tagline-dot"></span>
      <span>Learn</span>
      <span class="h-tagline-dot"></span>
      <span>Share</span>
    </div>
  </div>

  <!-- Isometric 3D Scene -->
  <div class="h-scene-slot">
    <svg class="h-scene" viewBox="0 0 360 240" fill="none">
      <defs>
        <linearGradient id="hPlat" x1="60" y1="120" x2="300" y2="220"><stop stop-color="#16203f"/><stop offset="1" stop-color="#0c1228"/></linearGradient>
        <linearGradient id="hFaceL" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#1b2a55"/><stop offset="1" stop-color="#11183200"/></linearGradient>
        <linearGradient id="hFaceR" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#14224a"/><stop offset="1" stop-color="#0d152e"/></linearGradient>
        <linearGradient id="hCyl" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#4FD1FF"/><stop offset="1" stop-color="#7B6CF6"/></linearGradient>
        <filter id="hSoft"><feGaussianBlur stdDeviation="3"/></filter>
      </defs>

      <!-- Platform base glow -->
      <ellipse cx="180" cy="186" rx="150" ry="46" fill="#4FD1FF" opacity=".10" filter="url(#hSoft)"/>

      <!-- Platform top -->
      <path d="M180 120 300 168 180 216 60 168Z" fill="url(#hPlat)" stroke="#4FD1FF" stroke-opacity=".55" stroke-width="1.2"/>
      <!-- Platform grid -->
      <path d="M120 144 240 192M150 132 270 180M180 120 180 216M210 132 90 180M240 144 120 192" stroke="#4FD1FF" stroke-opacity=".15" stroke-width="1"/>
      <!-- Platform sides -->
      <path d="M60 168 180 216 180 226 60 178Z" fill="#0a1124"/>
      <path d="M300 168 180 216 180 226 300 178Z" fill="#070d1c"/>

      <!-- Building tall (left) -->
      <g>
        <path d="M120 120 150 137 150 167 120 150Z" fill="url(#hFaceL)"/>
        <path d="M150 137 178 121 178 151 150 167Z" fill="url(#hFaceR)"/>
        <path d="M120 120 150 103 178 121 150 137Z" fill="#24386e" stroke="#4FD1FF" stroke-opacity=".5"/>
        <path d="M126 130v8M132 134v8M156 144v8M162 148v8" stroke="#4FD1FF" stroke-opacity=".4" stroke-width="1.4"/>
      </g>

      <!-- Building short (right) -->
      <g>
        <path d="M196 150 224 166 224 186 196 170Z" fill="url(#hFaceL)"/>
        <path d="M224 166 250 151 250 171 224 186Z" fill="url(#hFaceR)"/>
        <path d="M196 150 222 135 250 151 224 166Z" fill="#1d2f60" stroke="#7B6CF6" stroke-opacity=".5"/>
      </g>

      <!-- Wind turbine -->
      <g>
        <path d="M206 96 204 156 208 156Z" fill="#9fb0d8"/>
        <g class="h-blade" stroke="#cfe0ff" stroke-width="2.4" stroke-linecap="round">
          <path d="M206 96 206 70"/>
          <path d="M206 96 228 108"/>
          <path d="M206 96 184 108"/>
        </g>
        <circle cx="206" cy="96" r="3" fill="#fff"/>
      </g>

      <!-- Floating panel 1 (chart) -->
      <g class="h-panel">
        <rect x="64" y="86" width="56" height="38" rx="6" fill="#0f1832" stroke="#4FD1FF" stroke-opacity=".5"/>
        <rect x="72" y="108" width="6" height="9" rx="1" fill="#4FD1FF"/>
        <rect x="82" y="102" width="6" height="15" rx="1" fill="#7B6CF6"/>
        <rect x="92" y="98" width="6" height="19" rx="1" fill="#4FD1FF"/>
        <rect x="102" y="105" width="6" height="12" rx="1" fill="#7B6CF6"/>
        <rect x="72" y="94" width="24" height="3" rx="1.5" fill="#4FD1FF" opacity=".6"/>
      </g>

      <!-- Floating panel 2 (list) -->
      <g class="h-panel h-panel2">
        <rect x="244" y="92" width="54" height="36" rx="6" fill="#0f1832" stroke="#7B6CF6" stroke-opacity=".5"/>
        <circle cx="254" cy="103" r="3" fill="#33D98A"/><rect x="262" y="101" width="28" height="3.5" rx="1.7" fill="#9fb0d8" opacity=".6"/>
        <circle cx="254" cy="112" r="3" fill="#4FD1FF"/><rect x="262" y="110" width="22" height="3.5" rx="1.7" fill="#9fb0d8" opacity=".5"/>
        <circle cx="254" cy="121" r="3" fill="#FFB454"/><rect x="262" y="119" width="25" height="3.5" rx="1.7" fill="#9fb0d8" opacity=".5"/>
      </g>

      <!-- Traffic signal -->
      <g>
        <rect x="166" y="150" width="8" height="20" rx="3" fill="#0f1832" stroke="#2a3a66"/>
        <circle cx="170" cy="156" r="2.2" fill="#FF5C7A"/>
        <circle cx="170" cy="163" r="2.2" fill="#33D98A"/>
      </g>

      <!-- Little trees -->
      <path d="M150 168 153 162 156 168Z M152 168 154 164 156 168Z" fill="#2ec28a"/>
      <path d="M266 172 269 166 272 172Z" fill="#2ec28a"/>
    </svg>
  </div>


</main>

<!-- Discover Page -->
<main class="main page-section" id="page-discover" style="display:none">
  <!-- Trending Topics -->
  <div class="trending-bar" id="trendingBar">
    <button class="trending-chip active" data-filter="all">All</button>
    <button class="trending-chip" data-filter="trending">Trending</button>
    <button class="trending-chip" data-filter="nearmiss">Near Miss</button>
    <button class="trending-chip" data-filter="goodpractice">Good Practice</button>
    <button class="trending-chip" data-filter="observation">Observation</button>
    <button class="trending-chip" data-filter="tip">Tips</button>
  </div>
  <!-- Create Post Area -->
  <div class="create-post-card">
    <div class="create-post-header">
      <div class="avatar av-0">You</div>
      <button class="create-post-trigger" id="createPostTrigger">Share a safety moment, observation, or tip...</button>
    </div>
    <div class="create-post-actions">
      <button class="create-action-btn" id="createPostPhoto">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Photo
      </button>
      <button class="create-action-btn" id="createPostVideo">
        <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        Video
      </button>
      <button class="create-action-btn" id="createPostLocation">
        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Location
      </button>
    </div>
  </div>
  <!-- Discover Feed -->
  <div class="feed" id="discover-feed"></div>
</main>

<!-- Learn Page (safety videos) -->
<main class="main page-section" id="page-learn" style="display:none">
  <div class="page-banner learn-banner">
    <div class="banner-content">
      <h2>Safety Training Videos</h2>
      <p>Watch and learn from our safety training library</p>
    </div>
  </div>
  <div class="feed" id="feed"></div>
</main>

<!-- Create Post Modal -->
<div class="modal-overlay" id="createPostModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Create Post</h2>
      <button class="modal-close" id="createPostClose">&times;</button>
    </div>
    <div class="modal-body">
      <form id="createPostForm">
        <div class="form-group">
          <textarea id="postText" placeholder="What did you observe today? Share a safety moment, a tip, or something inspiring from a work site..." required></textarea>
        </div>
        <div class="form-group">
          <label>Attach Media (optional)</label>
          <div class="file-upload-area" id="postFileArea">
            <svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            <p>Click to attach a photo or video</p>
            <div class="file-name" id="postFileName"></div>
          </div>
          <input type="file" id="postFileInput" accept="image/*,video/*" style="display:none">
        </div>
        <button type="submit" class="btn-submit">Share Post</button>
      </form>
    </div>
  </div>
</div>

<!-- Upload Modal (hidden: to be enabled later) -->
<div class="modal-overlay" id="uploadModal" style="display:none!important">
  <div class="modal">
    <div class="modal-header">
      <h2>Upload Safety Video</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body">
      <form id="uploadForm">
        <div class="form-group">
          <label>Video File</label>
          <div class="file-upload-area" id="fileUploadArea">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Click to select a video file</p>
            <div class="file-name" id="fileName"></div>
          </div>
          <input type="file" id="fileInput" accept="video/*" style="display:none">
        </div>
        <div class="form-group">
          <label for="videoTitle">Title</label>
          <input type="text" id="videoTitle" placeholder="Enter video title" required>
        </div>
        <div class="form-group">
          <label for="videoDesc">Description</label>
          <textarea id="videoDesc" placeholder="Describe the safety topic covered..." required></textarea>
        </div>
        <div class="form-group">
          <label for="videoCat">Category</label>
          <select id="videoCat" required>
            <option value="">Select a category</option>
            <option value="confined">Confined Space</option>
            <option value="ppe">PPE</option>
            <option value="gas">Gas Safety</option>
            <option value="electrical">Electrical</option>
            <option value="excavation">Excavation</option>
            <option value="lifting">Lifting</option>
            <option value="general">General Safety</option>
            <option value="hazard">Hazard Zone</option>
            <option value="solar">Solar</option>
            <option value="wah">Work at Height</option>
          </select>
        </div>
        <button type="submit" class="btn-submit">Upload Video</button>
      </form>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="api.js"></script>
<script src="app.js"></script>
</body>
</html>
